name: Build Desktop and Mobile Apps

on:
  workflow_dispatch: # Manual trigger only — don't auto-build on every push

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Install Python Dependencies
        run: pip install pywebview pyinstaller

      - name: Build Windows .exe
        run: python desktop/build.py

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: InternMatch-Windows-Setup
          path: dist-desktop/InternMatch.exe

  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Node Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: InternMatch-Android-APK
          path: android/app/build/outputs/apk/debug/*.apk
